name: Build and Deploy to DigitalOcean

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Login to DigitalOcean Container Registry
        run: doctl registry login

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: registry.digitalocean.com/umami-backend-api/docker-agdoc:latest
          # Cache Docker layers between GitHub Action runs. The FFmpeg + Noto
          # fonts + pip install layers rarely change but reinstall every push.
          # GHA cache backend is free for public + private repos; mode=max caches
          # intermediate layers (not just the final image). First run after
          # adding this still slow; subsequent typically 2-3 min instead of ~10.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log out from DockerHub
        run: docker logout registry.digitalocean.com 